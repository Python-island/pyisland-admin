server:
  servlet:
    context-path: /api
  tomcat:
    max-swallow-size: 150MB

spring:
  application:
    name: server
  cache:
    type: redis
    redis:
      cache-null-values: false
      use-key-prefix: true
      key-prefix: 'server:'
      time-to-live: ${REDIS_CACHE_TTL}
  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT}
      password: ${REDIS_PASSWORD}
      database: ${REDIS_DATABASE}
      timeout: ${REDIS_TIMEOUT}
  rabbitmq:
    host: ${RABBITMQ_HOST}
    port: ${RABBITMQ_PORT}
    username: ${RABBITMQ_USERNAME}
    password: ${RABBITMQ_PASSWORD}
    listener:
      simple:
        default-requeue-rejected: true
  servlet:
    multipart:
      max-file-size: 120MB
      max-request-size: 150MB
  datasource:
    url: jdbc:mysql://${DB_HOST}:${DB_PORT}/${DB_NAME}?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}

jwt:
  secret: ${JWT_SECRET}
  expiration: ${JWT_EXPIRATION}

admin:
  bootstrap:
    username: ${ADMIN_BOOTSTRAP_USERNAME:test}
    email: ${ADMIN_BOOTSTRAP_EMAIL:test}
    password: ${ADMIN_BOOTSTRAP_PASSWORD:test}

aliyun:
  oss:
    endpoint: ${OSS_ENDPOINT}
    access-key-id: ${OSS_ACCESS_KEY_ID}
    access-key-secret: ${OSS_ACCESS_KEY_SECRET}
    bucket-name: ${OSS_BUCKET_NAME}
    domain: ${OSS_DOMAIN}

cloudflare:
  r2:
    endpoint: ${R2_ENDPOINT}
    access-key-id: ${R2_ACCESS_KEY_ID}
    access-key-secret: ${R2_ACCESS_KEY_SECRET}
    bucket-name: ${R2_BUCKET_NAME}
    public-domain: ${R2_PUBLIC_DOMAIN}
  wallpaper-r2:
    endpoint: ${WALLPAPER_R2_ENDPOINT}
    access-key-id: ${WALLPAPER_R2_ACCESS_KEY_ID}
    access-key-secret: ${WALLPAPER_R2_ACCESS_KEY_SECRET}
    bucket-name: ${WALLPAPER_R2_BUCKET_NAME}
    public-domain: ${WALLPAPER_R2_PUBLIC_DOMAIN}
  feedback-r2:
    endpoint: ${FEEDBACK_R2_ENDPOINT}
    access-key-id: ${FEEDBACK_R2_ACCESS_KEY_ID}
    access-key-secret: ${FEEDBACK_R2_ACCESS_KEY_SECRET}
    bucket-name: ${FEEDBACK_R2_BUCKET_NAME:eisland-feedback-assets}
    public-domain: ${FEEDBACK_R2_PUBLIC_DOMAIN}

resend:
  api-key: ${RESEND_API_KEY}
  from: ${RESEND_FROM}
  endpoint: ${RESEND_ENDPOINT:https://api.resend.com/emails}

email:
  notify-max-retries: ${EMAIL_NOTIFY_MAX_RETRIES:3}
  notify-retry-delay-ms: ${EMAIL_NOTIFY_RETRY_DELAY_MS:10000}

captcha:
  slider:
    enabled: ${SLIDER_CAPTCHA_ENABLED}
    provider: ${SLIDER_CAPTCHA_PROVIDER}
    builtin:
      min-value: ${SLIDER_CAPTCHA_MIN_VALUE}
      max-value: ${SLIDER_CAPTCHA_MAX_VALUE}
      tolerance: ${SLIDER_CAPTCHA_TOLERANCE}
      challenge-ttl-seconds: ${SLIDER_CAPTCHA_TTL_SECONDS}

totp:
  security:
    redis-database: ${REDIS_TOTP_DATABASE}
    aes-key-base64: ${TOTP_AES_KEY_BASE64}
    fail-max-attempts: ${TOTP_FAIL_MAX_ATTEMPTS}
    fail-window-seconds: ${TOTP_FAIL_WINDOW_SECONDS}
    rate-limit-user-per-minute: ${TOTP_RATE_LIMIT_USER_PER_MINUTE}
    rate-limit-ip-per-minute: ${TOTP_RATE_LIMIT_IP_PER_MINUTE}
    rate-window-seconds: ${TOTP_RATE_WINDOW_SECONDS}
    replay-protect-seconds: ${TOTP_REPLAY_PROTECT_SECONDS}
    decrypted-secret-cache-seconds: ${TOTP_DECRYPTED_SECRET_CACHE_SECONDS}
    encrypted-secret-cache-seconds: ${TOTP_ENCRYPTED_SECRET_CACHE_SECONDS}

issue-feedback:
  redis-database: ${REDIS_ISSUE_FEEDBACK_DATABASE}

payment:
  redis-database: ${REDIS_PAYMENT_DATABASE:10}
  notify-max-retries: ${PAYMENT_NOTIFY_MAX_RETRIES:5}
  notify-retry-delay-ms: ${PAYMENT_NOTIFY_RETRY_DELAY_MS:15000}
  wechat:
    enabled: ${WX_PAY_ENABLED:false}
    mch-id: ${WX_PAY_MCH_ID:}
    app-id: ${WX_PAY_APP_ID:}
    api-v3-key: ${WX_PAY_API_V3_KEY:}
    private-key-path: ${WX_PAY_PRIVATE_KEY_PATH:}
    serial-no: ${WX_PAY_SERIAL_NO:}
    notify-url: ${WX_PAY_NOTIFY_URL:}
    public-key-id: ${WX_PAY_PUBLIC_KEY_ID:}
    public-key-path: ${WX_PAY_PUBLIC_KEY_PATH:}
    platform-cert-path: ${WX_PAY_PLATFORM_CERT_PATH:}
    order-expire-minutes: ${WX_PAY_ORDER_EXPIRE_MINUTES:15}
    query-pending-batch-size: ${WX_PAY_QUERY_PENDING_BATCH_SIZE:100}
  alipay:
    enabled: ${ALIPAY_ENABLED:true}
    gateway-url: ${ALIPAY_GATEWAY_URL:https://openapi.alipay.com/gateway.do}
    app-id: ${ALIPAY_APP_ID:}
    private-key-path: ${ALIPAY_PRIVATE_KEY_PATH:}
    public-key-path: ${ALIPAY_PUBLIC_KEY_PATH:}
    notify-url: ${ALIPAY_NOTIFY_URL:}
    sign-type: ${ALIPAY_SIGN_TYPE:RSA2}
    charset: ${ALIPAY_CHARSET:UTF-8}
    query-pending-batch-size: ${ALIPAY_QUERY_PENDING_BATCH_SIZE:100}

mybatis:
  mapper-locations: classpath*:mapper/*.xml
  type-aliases-package: com.pyisland.server.user.entity,com.pyisland.server.version.entity,com.pyisland.server.servicestatus.entity
  configuration:
    map-underscore-to-camel-case: true
