server:
  servlet:
    context-path: /api

spring:
  application:
    name: server
  cache:
    type: redis
    redis:
      cache-null-values: false
      use-key-prefix: true
      key-prefix: 'server:'
      time-to-live: ${REDIS_CACHE_TTL}
  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT}
      password: ${REDIS_PASSWORD}
      database: ${REDIS_DATABASE}
      timeout: ${REDIS_TIMEOUT}
  rabbitmq:
    host: ${RABBITMQ_HOST}
    port: ${RABBITMQ_PORT}
    username: ${RABBITMQ_USERNAME}
    password: ${RABBITMQ_PASSWORD}
    listener:
      simple:
        default-requeue-rejected: true
  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 10MB
  datasource:
    url: jdbc:mysql://${DB_HOST}:${DB_PORT}/${DB_NAME}?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}

jwt:
  secret: ${JWT_SECRET}
  expiration: ${JWT_EXPIRATION}

admin:
  bootstrap:
    username: ${ADMIN_BOOTSTRAP_USERNAME:test}
    email: ${ADMIN_BOOTSTRAP_EMAIL:test}
    password: ${ADMIN_BOOTSTRAP_PASSWORD:test}

aliyun:
  oss:
    endpoint: ${OSS_ENDPOINT}
    access-key-id: ${OSS_ACCESS_KEY_ID}
    access-key-secret: ${OSS_ACCESS_KEY_SECRET}
    bucket-name: ${OSS_BUCKET_NAME}
    domain: ${OSS_DOMAIN}

cloudflare:
  r2:
    endpoint: ${R2_ENDPOINT}
    access-key-id: ${R2_ACCESS_KEY_ID}
    access-key-secret: ${R2_ACCESS_KEY_SECRET}
    bucket-name: ${R2_BUCKET_NAME}
    public-domain: ${R2_PUBLIC_DOMAIN}
  wallpaper-r2:
    endpoint: ${WALLPAPER_R2_ENDPOINT}
    access-key-id: ${WALLPAPER_R2_ACCESS_KEY_ID}
    access-key-secret: ${WALLPAPER_R2_ACCESS_KEY_SECRET}
    bucket-name: ${WALLPAPER_R2_BUCKET_NAME}
    public-domain: ${WALLPAPER_R2_PUBLIC_DOMAIN}
  turnstile:
    secret-key: ${TURNSTILE_SECRET_KEY}

resend:
  api-key: ${RESEND_API_KEY}
  from: ${RESEND_FROM}
  endpoint: ${RESEND_ENDPOINT:https://api.resend.com/emails}

mybatis:
  mapper-locations: classpath*:mapper/*.xml
  type-aliases-package: com.pyisland.server.user.entity,com.pyisland.server.version.entity,com.pyisland.server.servicestatus.entity
  configuration:
    map-underscore-to-camel-case: true
