server:
  servlet:
    context-path: /api

spring:
  application:
    name: server
  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 10MB
  datasource:
    url: jdbc:mysql://${DB_HOST}:${DB_PORT}/${DB_NAME}?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}

jwt:
  secret: ${JWT_SECRET}
  expiration: ${JWT_EXPIRATION:86400000}

admin:
  bootstrap:
    username: ${ADMIN_BOOTSTRAP_USERNAME:}
    email: ${ADMIN_BOOTSTRAP_EMAIL:}
    password: ${ADMIN_BOOTSTRAP_PASSWORD:}

aliyun:
  oss:
    endpoint: ${OSS_ENDPOINT}
    access-key-id: ${OSS_ACCESS_KEY_ID}
    access-key-secret: ${OSS_ACCESS_KEY_SECRET}
    bucket-name: ${OSS_BUCKET_NAME}
    domain: ${OSS_DOMAIN}

cloudflare:
  r2:
    endpoint: ${R2_ENDPOINT}
    access-key-id: ${R2_ACCESS_KEY_ID}
    access-key-secret: ${R2_ACCESS_KEY_SECRET}
    bucket-name: ${R2_BUCKET_NAME}
    public-domain: ${R2_PUBLIC_DOMAIN:}

mybatis:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.pyisland.server.entity
  configuration:
    map-underscore-to-camel-case: true
